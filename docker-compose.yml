# docker-compose.yml
name: kg_personality

services:

  # ── 1. FastAPI Application ─────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: production          # multi-stage build
    container_name: kg_fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      NEO4J_URI:      neo4j+s://d99ffd6c.databases.neo4j.io    # pakai service name, bukan localhost
      REDIS_URL:      redis://redis:6379/0
      NEO4J_AUTH:     d99ffd6c/99fZz-u3p2mZYlTGX4V2FumstQj9fDgwAAAQ-QeVGwc\
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./uploads:/app/uploads   # temp PDF uploads
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - kg_network

  # ── 2. Neo4j Graph Database ────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: kg_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-kg_password_2024}
      NEO4J_PLUGINS: '["apoc"]'

      # Aktifkan vektor index (wajib untuk similarity search)
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_security_procedures_allowlist:    "apoc.*,gds.*"

      # Memory tuning — sesuaikan dengan RAM tersedia
      NEO4J_server_memory_heap_initial__size:  "512m"
      NEO4J_server_memory_heap_max__size:      "1G"
      NEO4J_server_memory_pagecache_size:      "512m"

      # Log level
      NEO4J_dbms_logs_debug_level: "INFO"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_conf:/conf
      - ./db/plugins:/plugins    # APOC jar di-mount dari host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s          # Neo4j butuh waktu lebih lama untuk startup
    networks:
      - kg_network

  # ── 3. Redis Cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: kg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kg_network

  # ── 4. Neo4j Schema Init (one-shot) ───────────────────────────────────
  neo4j-init:
    image: neo4j:5.18-community
    container_name: kg_neo4j_init
    restart: "no"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo 'Waiting for Neo4j...'
        until wget -qO- http://neo4j:7474 > /dev/null 2>&1; do sleep 3; done
        sleep 5
        echo 'Running schema migration...'
        cypher-shell \
          -a bolt://neo4j:7687 \
          -u neo4j \
          -p ${NEO4J_PASSWORD:-kg_password_2024} \
          --file /migrations/01_schema.cypher
        echo 'Schema applied.'
    environment:
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-kg_password_2024}
    volumes:
      - ./db:/migrations:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - kg_network

  # ── 5. Frontend (nginx) ────────────────────────────────────────────────
  frontend:
    image: nginx:1.25-alpine
    container_name: kg_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - kg_network

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  kg_network:
    driver: bridge
    name: kg_network

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_conf:
  redis_data: