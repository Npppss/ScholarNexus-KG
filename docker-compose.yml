name: kg_personality

services:
  # ── 1. FastAPI Application ─────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: kg_fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: scholarNexus2024
      REDIS_URL: redis://kg_redis:6379/0
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - kg_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── 2. Redis Cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: kg_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kg_network

  # ── 3. Neo4j (Local) ───────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: kg_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/scholarNexus2024
      NEO4J_PLUGINS: '[]'
      NEO4J_dbms_security_auth__minimum__password__length: "4"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - kg_network

  # ── 4. Neo4j Schema Init ───────────────────────────────────────────────
  neo4j-init:
    image: neo4j:5.18-community
    container_name: kg_neo4j_init
    restart: "no"
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo '🚀 Memulai migrasi schema...'
        cypher-shell \
          -a bolt://neo4j:7687 \
          -u neo4j \
          -p scholarNexus2024 \
          --file /migrations/01_schema.cypher
        echo '✅ Schema berhasil diterapkan!'
    volumes:
      - ./db:/migrations:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - kg_network

  # ── 5. Frontend ────────────────────────────────────────────────────────
  frontend:
    image: nginx:1.25-alpine
    container_name: kg_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - kg_network

networks:
  kg_network:
    driver: bridge
    name: kg_network

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data: